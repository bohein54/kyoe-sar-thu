<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>KYOE SAR THU</title>

<link rel="icon"
type="image/png"
sizes="192x192"
href="https://i.postimg.cc/L473n1hp/Logo.png">

<link rel="apple-touch-icon"
sizes="180x180"
href="https://i.postimg.cc/L473n1hp/Logo.png">

<meta name="theme-color"
content="#0b132b">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
  margin:0;
  background:
  linear-gradient(
    135deg,
    #0b132b,
    #1c2541
  );

  color:white;
  font-family:sans-serif;
}

.table-input{
  background:#16213e;
  padding:12px;
  border-radius:12px;
  width:100%;
  border:1px solid #2ec4b6;
  color:white;
}

button{
  transition:0.2s;
}

button:active{
  transform:scale(.95);
}

.nav-btn{
  flex:1;
  text-align:center;
  padding:12px;
  cursor:pointer;
  color:#aaa;
}

.nav-btn.active{
  color:#2ec4b6;
  border-bottom:3px solid #2ec4b6;
}

.table-container{
  max-height:450px;
  overflow-y:auto;
  border-radius:15px;
  background:#1c2541;
}

tr:hover{
  background:#2a3b5f;
}

.lock-overlay{
  position:absolute;
  inset:0;
  background:
  rgba(11,19,43,.55);

  backdrop-filter:blur(2px);

  z-index:50;

  display:flex;
  justify-content:center;
  align-items:center;
}

.lock-icon{
  font-size:60px;
  color:
  rgba(255,77,109,.45);
}

.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:#16a34a;
  color:white;
  padding:14px 24px;
  border-radius:14px;
  font-weight:bold;
  z-index:9999;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}

.toast.show{
  opacity:1;
  top:35px;
}

</style>

</head>

<body onload="initApp()">

<!-- LOGIN -->

<div id="loginPage"
class="flex justify-center items-center h-screen">

<div class="bg-[#1c2541]
p-6 rounded-2xl
w-80 border
border-gray-700
shadow-2xl">

<div class="flex justify-center mb-4">

<img
src="https://i.postimg.cc/L473n1hp/Logo.png"
class="w-24 h-24 rounded-full border-4 border-cyan-400 object-cover">

</div>

<h2 class="text-center mb-2
text-cyan-400 font-bold
text-xl">

WELCOME

</h2>

<p class="text-center
text-gray-400 text-xs mb-4">

Login to continue

</p>

<input
id="username"
class="table-input mb-4"
value="Bo hein"
readonly>

<input
id="password"
type="password"
class="table-input mb-4"
placeholder="Password">

<button
onclick="checkLogin()"
class="w-full
bg-cyan-600
p-3 rounded-xl
font-bold">

LOGIN

</button>

</div>

</div>

<!-- MAIN -->

<div id="mainApp"
class="hidden p-3 max-w-4xl mx-auto">

<div class="flex mb-3
bg-[#0b132b]
rounded-t-xl overflow-hidden">

<div
onclick="showTab('entry')"
class="nav-btn active"
id="tab1">

ENTRY

</div>

<div
onclick="showTab('list')"
class="nav-btn"
id="tab2">

LIST

</div>

</div>

<!-- ENTRY -->

<div id="entrySection">

<div class="bg-[#1c2541]
p-5 rounded-2xl">

<label class="text-[10px]
text-cyan-400">

DATE

</label>

<input
type="date"
id="date"
class="table-input mb-3">

<label class="text-[10px]
text-cyan-400">

END TIME

</label>

<label class="text-[10px] text-cyan-400 font-bold mb-1 block">
အလုပ်ဝင်ချိန်
</label>

<select id="startTime" class="table-input mb-3" onchange="calculate()">
  <option value="08:00 AM">08:00 AM</option>
  <option value="OFF DAY">အလုပ်ပိတ်ရက်</option>
</select>
  
<select
id="endTime"
class="table-input mb-4"
onchange="calculate()">

<option value="05:00 PM">
05:00 PM
</option>

<option value="06:00 PM">
06:00 PM
</option>

<option value="07:00 PM">
07:00 PM
</option>

<option value="08:00 PM">
08:00 PM
</option>

<option value="09:00 PM">
09:00 PM
</option>

<option value="10:00 PM">
10:00 PM
</option>

<option value="12:00 PM">
နေ့တဝက်
</option>

<option value="OFF DAY">
OFF DAY
</option>

</select>

<div class="grid
grid-cols-2
gap-3 mb-4">

<div class="bg-black/20
p-3 rounded-xl
text-center">

<div class="text-[10px]
text-gray-500">

OT HOURS

</div>

<div id="resOt"
class="text-xl
font-bold
text-yellow-400">

0 hr

</div>

</div>

<div class="bg-black/20
p-3 rounded-xl
text-center">

<div class="text-[10px]
text-gray-500">

DAILY PAY

</div>

<div id="resTotal"
class="text-xl
font-bold
text-green-400">

฿400.00

</div>

</div>

</div>

<button
id="addBtn"
onclick="saveData()"
class="bg-green-600
w-full p-4
rounded-xl
font-bold">

ADD RECORD

</button>

</div>

</div>

<!-- LIST -->

<div id="listSection"
style="display:none;">

<div class="flex
justify-between
items-center mb-3">

<select
id="monthView"
onchange="loadData()"
class="table-input w-40">

</select>

<button
onclick="exportPdf()"
class="bg-blue-600
px-4 py-2
rounded-lg">

PDF

</button>

</div>

<div class="bg-black/20
p-4 rounded-xl mb-4
flex justify-between">

<div>

<div class="text-[10px]
text-gray-400">

OT TOTAL

</div>

<div id="total14Ot"
class="text-yellow-400
font-bold text-xl">

0 hr

</div>

</div>

<div class="text-right">

<div class="text-[10px]
text-gray-400">

PAY TOTAL

</div>

<div id="total14Pay"
class="text-green-400
font-bold text-xl">

฿0.00

</div>

</div>

</div>

<div id="dateRangeDisplay"
class="text-center
font-bold mb-4
text-cyan-400">

DATE RANGE

</div>

<div class="table-container
border border-gray-800"
style="position:relative;"
ondblclick="handleTableDoubleClick()">

<table class="w-full
text-center text-[12px]">

<thead class="bg-[#0b132b]
text-gray-400">

<tr>

<th class="p-3">
DATE
</th>

<th class="p-3">
OT
</th>

<th class="p-3">
PAY
</th>

<th class="p-3">
DEL
</th>

</tr>

</thead>

<tbody id="dataTableBody">

</tbody>

</table>

<div id="tableLockOverlay"
class="lock-overlay"
style="display:none;">

<div class="lock-icon">

🔒

</div>

</div>

</div>

<div class="flex
justify-between
items-center mt-4">

<button
id="prevBtn"
onclick="changePage(-1)"
class="bg-gray-700
px-4 py-2
rounded-lg">

BACK

</button>

<span id="pageInfo">

PAGE 1

</span>

<button
id="nextBtn"
onclick="changePage(1)"
class="bg-gray-700
px-4 py-2
rounded-lg">

NEXT

</button>

</div>

</div>

</div>

<div id="toast"
class="toast">

DONE

</div>

<script>
let isLockedBySystem = true;
let currentPage = 0;
let currentMonthData = [];

function getStorageKey(month){

  return "KYOE_SAR_THU_" + month;
}

function initApp(){

  let m = [
    "JANUARY",
    "FEBRUARY",
    "MARCH",
    "APRIL",
    "MAY",
    "JUNE",
    "JULY",
    "AUGUST",
    "SEPTEMBER",
    "OCTOBER",
    "NOVEMBER",
    "DECEMBER"
  ];

  let monthView =
  document.getElementById("monthView");

  m.forEach(x=>{

    let o =
    document.createElement("option");

    o.value = x;
    o.text = x;

    monthView.appendChild(o);
  });

  monthView.value =
  m[new Date().getMonth()];

  document.getElementById("date").value =
  new Date().toISOString().split('T')[0];
}

function checkLogin(){

  let user =
  document.getElementById("username").value;

  let pass =
  document.getElementById("password").value;

  if(
    user === "Bo hein" &&
    pass === "000000"
  ){

    document.getElementById(
      "loginPage"
    ).style.display = "none";

    document.getElementById(
      "mainApp"
    ).style.display = "block";

    loadData();

  }else{

    showToast(
      "Password မှားနေပါတယ်",
      "error"
    );
  }
}

function showTab(t){

  document.getElementById(
    "entrySection"
  ).style.display =
  t === "entry"
  ? "block"
  : "none";

  document.getElementById(
    "listSection"
  ).style.display =
  t === "list"
  ? "block"
  : "none";
}

function calculate(){

  let endTime =
  document.getElementById(
    "endTime"
  ).value;

  let resOt =
  document.getElementById(
    "resOt"
  );

  let resTotal =
  document.getElementById(
    "resTotal"
  );

  if(endTime === "OFF DAY"){

    resOt.innerText = "0 hr";

    resTotal.innerText = "฿0.00";

    return;
  }

  if(endTime === "12:00 PM"){

    resOt.innerText = "0 hr";

    resTotal.innerText = "฿200.00";

    return;
  }

  let map = {

    "05:00 PM":9,
    "06:00 PM":10,
    "07:00 PM":11,
    "08:00 PM":12,
    "09:00 PM":13,
    "10:00 PM":14

  };

  let hrs =
  map[endTime] || 9;

  let ot =
  hrs > 9
  ? hrs - 9
  : 0;

  resOt.innerText =
  ot + " hr";

  resTotal.innerText =
  "฿" +
  (400 + ot * 50).toFixed(2);
}

function loadData(
  keepPage = false
){

  let oldPage =
  currentPage;

  let month =
  document.getElementById(
    "monthView"
  ).value;

  let saved =
  localStorage.getItem(
    getStorageKey(month)
  );

  currentMonthData =
  saved
  ? JSON.parse(saved)
  : [];

  if(keepPage){

    currentPage =
    oldPage;

  }else{

    currentPage = 0;
  }

  renderTable();
}

function renderTable(){

  let tOt = 0;
  let tPay = 0;

  let tbody =
  document.getElementById(
    "dataTableBody"
  );

  tbody.innerHTML = "";

  let start =
  currentPage * 14;

  let page =
  currentMonthData.slice(
    start,
    start + 14
  );

  if(page.length > 0){

    let firstDate =
    page[0].data[0];

    let lastDate =
    page[
      page.length - 1
    ].data[0];

    document.getElementById(
      "dateRangeDisplay"
    ).innerHTML =
    firstDate +
    " ➔ " +
    lastDate;
  }

  page.forEach(it=>{

    let r = it.data;

    let otValue =
    parseFloat(r[4]) || 0;

    let payStr =
    r[6]
    ? r[6].toString()
    : "0";

    let payValue =
    parseFloat(
      payStr.replace("฿","")
    ) || 0;

    let payDisplay;

    if(
      otValue === 0 &&
      payValue === 0
    ){

      payDisplay =
      "OFF DAY";

    }else{

      tOt += otValue;

      tPay += payValue;

      payDisplay = r[6];
    }

    tbody.innerHTML += `

<tr
style="
border-bottom:
1px solid #2ec4b6;
">

<td style="padding:8px;">

${r[0]}

</td>

<td style="padding:8px;">

<span
contenteditable="true"

onblur="
updateCell(
${it.rowIndex},
4,
this.innerText
)
">

${r[4]}

</span> hr

</td>

<td style="padding:8px;">

${payDisplay}

</td>

<td style="padding:8px;">

<button
style="color:#ff4d6d"

onclick="
del(${it.rowIndex})
">

✕

</button>

</td>

</tr>

`;
  });

  document.getElementById(
    "total14Ot"
  ).innerText =
  tOt + " hr";

  document.getElementById(
    "total14Pay"
  ).innerText =
  "฿" +
  tPay.toFixed(2);

  document.getElementById(
    "pageInfo"
  ).innerText =
  "PAGE " +
  (currentPage + 1);

  document.getElementById(
    "prevBtn"
  ).disabled =
  currentPage === 0;

  document.getElementById(
    "nextBtn"
  ).disabled =
  (
    (
      currentPage + 1
    ) * 14
    >=
    currentMonthData.length
  );

  applyLockUI();
}

function applyLockUI(){

  let lockOverlay =
  document.getElementById(
    "tableLockOverlay"
  );

  if(!lockOverlay) return;

  let currentPageData =
  currentMonthData.slice(
    currentPage * 14,
    currentPage * 14 + 14
  );

  if(
    currentPageData.length >= 14
  ){

    if(isLockedBySystem){

      lockOverlay.style.display =
      "flex";

    }else{

      lockOverlay.style.display =
      "none";
    }

  }else{

    lockOverlay.style.display =
    "none";
  }
}

function handleTableDoubleClick(){

  let currentPageData =
  currentMonthData.slice(
    currentPage * 14,
    currentPage * 14 + 14
  );

  if(
    currentPageData.length < 14
  ) return;

  isLockedBySystem =
  !isLockedBySystem;

  applyLockUI();

  if(isLockedBySystem){

    showToast(
      "lock ခတ်လိုက်ပါပြီ",
      "error"
    );

  }else{

    showToast(
      "lock ဖြုတ်ပြီးပါပြီ"
    );
  }
}

function changePage(step){

  let maxPage =
  Math.ceil(
    currentMonthData.length / 14
  ) - 1;

  currentPage += step;

  if(currentPage < 0)
  currentPage = 0;

  if(currentPage > maxPage)
  currentPage = maxPage;

  isLockedBySystem = true;

  renderTable();
}


function saveData(){
  const btn = document.getElementById("addBtn");
  btn.disabled = true;
  btn.innerText = "SAVING...";

  let dateValue = document.getElementById("date").value;
  let startVal = document.getElementById("startTime").value;
  let endVal = document.getElementById("endTime").value;

  let map = {
    "05:00 PM":9,
    "06:00 PM":10,
    "07:00 PM":11,
    "08:00 PM":12,
    "09:00 PM":13,
    "10:00 PM":14
  };

  let hrs = map[endVal] || 0;

  let isOff = endVal === "OFF DAY";
  let isHalf = endVal === "12:00 PM";

  let ot = hrs > 9 ? hrs - 9 : 0;

  let data = {
    date: dateValue,
    startTime: startVal,
    endTime: endVal,
    workHours: isOff ? 0 : (isHalf ? 4 : hrs),
    otHours: (isOff || isHalf) ? 0 : ot,
    otPay: (isOff || isHalf)
      ? "฿0.00"
      : "฿" + (ot * 50).toFixed(2),

    dailyPay: isOff
      ? "฿0.00"
      : (isHalf
        ? "฿200.00"
        : "฿" + (400 + ot * 50).toFixed(2))
  };

  let allData =
    JSON.parse(localStorage.getItem("kyoeData")) || [];

  allData.unshift(data);

  localStorage.setItem(
    "kyoeData",
    JSON.stringify(allData)
  );

  btn.disabled = false;
  btn.innerText = "ADD RECORD";

  showToast("သိမ်းဆည်းပြီးပါပြီ");

  loadData();
}      

  

function del(i){

  if(confirm("Delete?")){

    let month =
    document.getElementById(
      "monthView"
    ).value;

    let saved =
    localStorage.getItem(
      getStorageKey(month)
    );

    let arr =
    saved
    ? JSON.parse(saved)
    : [];

    arr =
    arr.filter(
      x =>
      x.rowIndex !== i
    );

    localStorage.setItem(

      getStorageKey(month),

      JSON.stringify(arr)
    );

    loadData();
  }
}

function updateCell(

  rowIndex,

  colIndex,

  newValue

){

  let month =
  document.getElementById(
    "monthView"
  ).value;

  let saved =
  localStorage.getItem(
    getStorageKey(month)
  );

  let arr =
  saved
  ? JSON.parse(saved)
  : [];

  arr.forEach(item=>{

    if(
      item.rowIndex === rowIndex
    ){

      item.data[colIndex] =
      newValue;

      let ot =
      parseFloat(
        item.data[4]
      ) || 0;

      item.data[6] =
      "฿" +
      (
        400 + ot * 50
      ).toFixed(2);
    }
  });

  localStorage.setItem(

    getStorageKey(month),

    JSON.stringify(arr)
  );

  loadData(true);

  showToast(
    "ပြင်ပြီးပါပြီ"
  );
}

function showToast(

  message,

  type = "success"

){

  const toast =
  document.getElementById(
    "toast"
  );

  toast.innerHTML =
  message;

  toast.style.background =
  "";

  if(type === "error"){

    toast.style.background =
    "linear-gradient(135deg,#ff1744,#ff5252)";

  }else{

    toast.style.background =
    "linear-gradient(135deg,#00c853,#64dd17)";
  }

  toast.classList.add(
    "show"
  );

  clearTimeout(
    window.toastTimer
  );

  window.toastTimer =
  setTimeout(()=>{

    toast.classList.remove(
      "show"
    );

  },2200);
}

async function exportPdf(){

  const { jsPDF } =
  window.jspdf;

  let pdf =
  new jsPDF(
    "p",
    "mm",
    "a4"
  );

  let startY = 20;

  pdf.setFontSize(18);

  pdf.text(
    "KYOE SAR THU",
    105,
    12,
    {align:"center"}
  );

  let start =
  currentPage * 14;

  let pageData =
  currentMonthData.slice(
    start,
    start + 14
  );

  pageData.forEach(it=>{

    let r = it.data;

    pdf.text(
      r[0],
      20,
      startY
    );

    pdf.text(
      r[4] + " hr",
      90,
      startY
    );

    pdf.text(
      r[6],
      140,
      startY
    );

    startY += 10;
  });

  pdf.save(
    "KYOE_SAR_THU.pdf"
  );
}
</script>
</body>
</html>
